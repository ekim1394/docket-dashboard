name: Update Dashboard Data

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run aggregation
        run: python scripts/aggregate.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="data-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add public/data/
          git commit -m "Update dashboard data ($(date +%Y-%m-%d))"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update dashboard data ($(date +%Y-%m-%d))" \
            --body "Automated weekly data refresh from R2 Parquet files." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
